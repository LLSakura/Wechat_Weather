name: Daily Weather Push

on:
  schedule:
    # 早安推送：北京时间 07:20 (避开半点拥堵)
    - cron: '20 23 * * *'
    # 晚安推送：北京时间 21:50 (避开整点拥堵，防止 12 点才收到)
    - cron: '50 13 * * *'

  # 允许在 GitHub 网页上手动触发
  workflow_dispatch:
    inputs:
      push_mode:
        description: '推送模式'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - evening

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine Push Mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "push_mode=${{ github.event.inputs.push_mode }}" >> $GITHUB_OUTPUT
          else
            # 获取 UTC 小时
            HOUR=$(date -u +%H)
            # 23点或0点触发判断为早安
            if [ "$HOUR" = "23" ] || [ "$HOUR" = "00" ]; then
              echo "push_mode=morning" >> $GITHUB_OUTPUT
            else
              echo "push_mode=evening" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run Weather Script
        env:
          # PushPlus
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PUSHPLUS_TOPIC: ${{ secrets.PUSHPLUS_TOPIC }}
          # Gemini
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          # 和风天气
          QWEATHER_API_KEY: ${{ secrets.QWEATHER_API_KEY }}
          QWEATHER_API_HOST: ${{ secrets.QWEATHER_API_HOST }}
          # 城市配置
          CITY_1_PERSON: Sakura
          CITY_1_ID: '101010100'
          CITY_1_NAME: 北京
          CITY_2_PERSON: 之间
          CITY_2_ID: '101240704'
          CITY_2_NAME: 南康
        run: |
          # 运行脚本，如果失败则等待 30 秒重试一次 (应对 Gemini 503 报错)
          python main.py --mode ${{ steps.mode.outputs.push_mode }} || (sleep 30 && python main.py --mode ${{ steps.mode.outputs.push_mode }})
