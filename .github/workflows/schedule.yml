name: Daily Weather Push

on:
  schedule:
    # 早安推送：北京时间 07:28 (UTC 23:28) 避开半点高峰
    - cron: '28 23 * * *'
    # 晚安推送：北京时间 22:28 (UTC 14:28) 避开半点高峰
    - cron: '28 14 * * *'

  # 允许在 GitHub 网页上手动触发
  workflow_dispatch:
    inputs:
      push_mode:
        description: '推送模式'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - evening

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python - m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine Push Mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "push_mode=${{ github.event.inputs.push_mode }}" >> $GITHUB_OUTPUT
          else
            # 获取当前 UTC 小时
            HOUR=$(date -u +%H)
            echo "Current UTC hour is: $HOUR"
            
            # 宽泛匹配：UTC 22, 23, 00, 01, 02 都视为早晨推送
            # 对应北京时间：06:00 - 10:59
            if [ "$HOUR" = "22" ] || [ "$HOUR" = "23" ] || [ "$HOUR" = "00" ] || [ "$HOUR" = "01" ] || [ "$HOUR" = "02" ]; then
              echo "push_mode=morning" >> $GITHUB_OUTPUT
              echo "Matched morning mode"
            else
              # 其余时间（主要是下午到深夜运行的任务）视为晚安推送
              echo "push_mode=evening" >> $GITHUB_OUTPUT
              echo "Matched evening mode"
            fi
          fi

      - name: Run Weather Script
        env:
          # 以下变量会自动从你的 GitHub Secrets 中读取
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PUSHPLUS_TOPIC: ${{ secrets.PUSHPLUS_TOPIC }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          QWEATHER_API_KEY: ${{ secrets.QWEATHER_API_KEY }}
          QWEATHER_API_HOST: ${{ secrets.QWEATHER_API_HOST }}
          # 城市配置（保持你之前的配置）
          CITY_1_PERSON: Sakura
          CITY_1_ID: '101010100'
          CITY_1_NAME: 北京
          CITY_2_PERSON: 之间
          CITY_2_ID: '101240704'
          CITY_2_NAME: 南康
        run: |
          # 运行脚本，如果失败则等待 30 秒重试一次
          python main.py --mode ${{ steps.mode.outputs.push_mode }} || (sleep 30 && python main.py --mode ${{ steps.mode.outputs.push_mode }})
